name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Testes da blockchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instala dependências
        run: npm ci

      - name: Roda os testes
        run: npm test
